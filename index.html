<!DOCTYPE html> <!-- このファイルはhtml -->
<html lang="ja"> <!-- htmlスタート　このページは日本語 -->

<head> <!-- 設定 -->
  <meta charset="UTF-8"> <!-- 文字化け防止　-->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- スマホ対応 -->
  <title>給料管理アプリ</title> <!-- ブラウザのタイトル -->

  <link rel="stylesheet" href="style.css"> <!-- style.cssを読み込む-->
</head> <!-- 設定ここまで -->

<body> <!-- 画面に見える部分 -->

  <h1>給料管理アプリ</h1> <!--見出し-->

  <h2>案件登録</h2> <!--小見出し-->

  <input type="text" placeholder="案件名"> <!-- 案件名を入力-->
  <select> <!--選ぶ 基本optionかinputを使う-->
    <option>時給制</option>
    <option>単価制</option>
  </select>

  <input type="number" placeholder="金額"> <!--金額を入力-->

  <button>登録</button>
  <h2>案件編集</h2> <!--小見出し-->
    <input type="text" placeholder="案件名"> <!-- 案件名を編集-->
  <select> <!--制度の編集-->
    <option>時給制</option>
    <option>単価制</option>
  </select>

  <input type="number" placeholder="金額"> <!--金額を編集-->

  <button>編集を保存</button>
  <h2>案件を選択</h2> <!-- 小見出し -->

  <select>
    <option>案件を選択</option>
  </select>

  <p>勤務日を入力</p>
  <input type="date">

  <p>備考欄</p>
  <input type="text">
  
  <script src="script.js"></script> <!--script.jsをつなぐ-->
</body><!--見える部分終わり-->

</html><!--html終了-->
