<!DOCTYPE html> <!-- このファイルはhtml -->
<html lang="ja"> <!-- htmlスタート　このページは日本語 -->

<head> <!-- 設定 -->
  <meta charset="UTF-8"> <!-- 文字化け防止　-->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- スマホ対応 -->
  <title>給料管理アプリ</title> <!-- ブラウザのタイトル -->

  <link rel="stylesheet" href="style.css"> <!-- style.cssを読み込む-->
</head> <!-- 設定ここまで -->

<body> <!-- 画面に見える部分 -->

  <h1>給料管理アプリ</h1> <!--見出し-->

  <h2>案件登録</h2> <!--小見出し-->

  <input type="text" placeholder="案件名">
  <select>
    <option>時給制</option>
    <option>単価制</option>
  </select>

  <input type="number" placeholder="金額">

  <button>登録</button>

  <h2>案件を選択</h2>

  <select>
    <option>案件を選択</option>
  </select>

  <p>勤務日を入力</p>
  <input type="date">

  
  <script src="script.js"></script> <!--script.jsをつなぐ-->
</body><!--見える部分終わり-->

</html><!--html終了-->
